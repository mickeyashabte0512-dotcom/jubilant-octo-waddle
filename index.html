<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechStore Pro</title>
  <style>
    :root {
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --text-color: #0f172a;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
      --primary: #0284c7;
      --primary-hover: #0369a1;
    }

    body.dark-mode {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --text-color: #f8fafc;
      --text-muted: #94a3b8;
      --border-color: #334155;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      transition: background-color 0.2s, color 0.2s;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      padding-bottom: 60px;
    }

    /* Header & Nav */
    header {
      background-color: var(--card-bg);
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--primary);
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .theme-toggle {
      background: none;
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 8px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .cart-badge {
      background-color: var(--primary);
      color: white;
      padding: 8px 18px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
    }

    /* Main Container */
    .container {
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 24px;
    }

    /* Search & Filter Bar */
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .search-input, .filter-select {
      padding: 12px 16px;
      border: 1px solid var(--border-color);
      background-color: var(--card-bg);
      color: var(--text-color);
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
    }

    .search-input {
      flex: 1;
      min-width: 250px;
    }

    .search-stats {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    /* Product Grid */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 24px;
    }

    .product-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
    }

    .product-img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      cursor: pointer;
    }

    .product-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      justify-content: space-between;
    }

    .category-tag {
      font-size: 0.75rem;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .product-title {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 8px;
      cursor: pointer;
    }

    .product-price {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-color);
      margin-bottom: 14px;
    }

    .btn {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }

    .btn:hover {
      background-color: var(--primary-hover);
    }

    /* Empty Search State */
    .no-results {
      text-align: center;
      padding: 40px 20px;
      background: var(--card-bg);
      border: 1px dashed var(--border-color);
      border-radius: 12px;
      grid-column: 1 / -1;
    }

    .no-results h3 {
      margin-bottom: 8px;
    }

    .no-results p {
      color: var(--text-muted);
    }

    /* Modals & Overlays */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      z-index: 200;
    }

    .overlay.active { display: block; }

    .modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 480px;
      z-index: 300;
      display: none;
    }

    .modal.active { display: block; }

    .modal-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 16px;
    }

    /* Slide-out Cart Drawer */
    .cart-drawer {
      position: fixed;
      top: 0;
      right: -400px;
      width: 360px;
      max-width: 90%;
      height: 100%;
      background: var(--card-bg);
      z-index: 300;
      transition: right 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .cart-drawer.open { right: 0; }

    .cart-header {
      padding: 20px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cart-body {
      padding: 20px;
      flex-grow: 1;
      overflow-y: auto;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
    }

    .cart-footer {
      padding: 20px;
      border-top: 1px solid var(--border-color);
    }

    .promo-section {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .promo-input {
      flex: 1;
      padding: 8px;
      border: 1px solid var(--border-color);
      background: var(--bg-color);
      color: var(--text-color);
      border-radius: 6px;
    }

    .cart-total {
      display: flex;
      justify-content: space-between;
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 16px;
    }

    #toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #0f172a;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      display: none;
      z-index: 400;
    }
  </style>
</head>
<body>

  <header>
    <div class="nav-container">
      <div class="logo">TechStore</div>
      <div class="nav-actions">
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙 Dark</button>
        <div class="cart-badge" onclick="toggleCart(true)" id="cart-badge">Cart: 0</div>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="controls">
      <input type="text" id="search-input" class="search-input" placeholder="Search by name, description, or category..." oninput="filterProducts()" />
      <select id="filter-select" class="filter-select" onchange="filterProducts()">
        <option value="all">All Categories</option>
        <option value="Audio">Audio</option>
        <option value="Accessories">Accessories</option>
        <option value="Peripherals">Peripherals</option>
        <option value="Displays">Displays</option>
      </select>
    </div>

    <div class="search-stats" id="search-stats">Showing all products</div>

    <div class="product-grid" id="product-grid"></div>
  </main>

  <!-- Product Detail Modal -->
  <div class="overlay" id="overlay" onclick="closeAllModals()"></div>
  <div class="modal" id="product-modal">
    <img id="modal-img" class="modal-img" src="" alt="" />
    <h3 id="modal-title" style="margin-bottom: 8px;"></h3>
    <p id="modal-desc" style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 16px;"></p>
    <div id="modal-price" style="font-size: 1.3rem; font-weight: 700; margin-bottom: 16px;"></div>
    <button class="btn" id="modal-add-btn">Add to Cart</button>
  </div>

  <!-- Cart Drawer -->
  <aside class="cart-drawer" id="cart-drawer">
    <div class="cart-header">
      <h2>Your Cart</h2>
      <button style="background:none; border:none; color:var(--text-color); font-size:1.5rem; cursor:pointer;" onclick="toggleCart(false)">&times;</button>
    </div>
    <div class="cart-body" id="cart-items"></div>
    <div class="cart-footer">
      <div class="promo-section">
        <input type="text" id="promo-input" class="promo-input" placeholder="Promo code (e.g. DISCOUNT10)" />
        <button class="btn" style="width: auto; padding: 8px 12px;" onclick="applyPromo()">Apply</button>
      </div>
      <div class="cart-total">
        <span>Total:</span>
        <span id="cart-total-price">$0.00</span>
      </div>
      <button class="btn" style="background:#10b981" onclick="handleCheckout()">Checkout Now</button>
    </div>
  </aside>

  <div id="toast">Item added to cart!</div>

  <script>
    // Expanded catalog of products
    let products = [
      { id: 1, name: "Minimalist Watch", price: 49.99, category: "Accessories", desc: "A sleek, water-resistant analog timepiece with a stainless steel band.", img: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400" },
      { id: 2, name: "Wireless Earbuds", price: 29.99, category: "Audio", desc: "Crystal clear audio with active noise cancellation and 24h battery life.", img: "https://images.unsplash.com/photo-1590658268037-6bf12165a8df?w=400" },
      { id: 3, name: "Leather Backpack", price: 79.99, category: "Accessories", desc: "Premium genuine leather laptop backpack designed for daily travel.", img: "https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=400" },
      { id: 4, name: "Mechanical Keyboard", price: 89.99, category: "Peripherals", desc: "RGB backlit mechanical keyboard with tactile blue switches.", img: "https://images.unsplash.com/photo-1587829741301-dc798b83add3?w=400" },
      { id: 5, name: "Gaming Mouse", price: 39.99, category: "Peripherals", desc: "Ergonomic wired gaming mouse with customizable DPI levels and RGB light.", img: "https://images.unsplash.com/photo-1527864550417-7fd91fc51a46?w=400" },
      { id: 6, name: "Over-Ear Headphones", price: 119.99, category: "Audio", desc: "High-fidelity studio monitor headphones with deep bass response.", img: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400" },
      { id: 7, name: "4K Gaming Monitor", price: 299.99, category: "Displays", desc: "27-inch 144Hz 4K IPS display with ultra-thin bezel design.", img: "https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?w=400" },
      { id: 8, name: "Smart Speaker", price: 49.99, category: "Audio", desc: "Voice-controlled smart home speaker with room-filling sound quality.", img: "https://images.unsplash.com/photo-1589003077984-894e133dabab?w=400" },
      { id: 9, name: "USB-C Multiport Dock", price: 34.99, category: "Accessories", desc: "7-in-1 aluminum USB hub with HDMI output and SD card reader.", img: "https://images.unsplash.com/photo-1544652478-6653e09f18a2?w=400" },
      { id: 10, name: "Desk Mat Pad", price: 19.99, category: "Peripherals", desc: "Large waterproof felt desk mat pad for mouse and keyboard setup.", img: "https://images.unsplash.com/photo-1616440347437-b1c73416efc2?w=400" },
      { id: 11, name: "Portable SSD 1TB", price: 99.99, category: "Accessories", desc: "Compact high-speed external solid state drive with shock resistance.", img: "https://images.unsplash.com/photo-1597872200969-2b65d56bd16b?w=400" },
      { id: 12, name: "Webcam 1080p", price: 44.99, category: "Peripherals", desc: "Full HD streaming webcam with built-in microphone and privacy shutter.", img: "https://images.unsplash.com/photo-1587826080692-f439cd0b70da?w=400" }
    ];

    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    let discount = 0;

    async function fetchProducts() {
      try {
        const response = await fetch('/api/products');
        if (response.ok) {
          const apiProducts = await response.json();
          if (apiProducts && apiProducts.length > 0) {
            products = apiProducts.map((p, idx) => ({
              ...p,
              category: p.category || "General",
              desc: p.desc || "High-grade tech product designed for everyday usage.",
              img: p.img || products[idx]?.img || "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400"
            }));
          }
        }
      } catch (err) {
        console.log("Using local extended catalog");
      }
      renderProducts(products);
    }

    function renderProducts(items) {
      const grid = document.getElementById('product-grid');
      const stats = document.getElementById('search-stats');

      stats.textContent = `Showing ${items.length} of ${products.length} products`;

      if (items.length === 0) {
        grid.innerHTML = `
          <div class="no-results">
            <h3>No products found</h3>
            <p>Try searching for a different term or clear the search filters.</p>
          </div>
        `;
        return;
      }

      grid.innerHTML = items.map(p => `
        <div class="product-card">
          <img src="${p.img}" alt="${p.name}" class="product-img" onclick="openQuickView(${p.id})">
          <div class="product-body">
            <div>
              <div class="category-tag">${p.category}</div>
              <div class="product-title" onclick="openQuickView(${p.id})">${p.name}</div>
            </div>
            <div>
              <div class="product-price">$${p.price.toFixed(2)}</div>
              <button class="btn" onclick="addToCart(${p.id})">Add to Cart</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    // Advanced search across name, category, and description
    function filterProducts() {
      const query = document.getElementById('search-input').value.trim().toLowerCase();
      const category = document.getElementById('filter-select').value;

      const filtered = products.filter(p => {
        const matchesQuery = p.name.toLowerCase().includes(query) ||
                             p.category.toLowerCase().includes(query) ||
                             p.desc.toLowerCase().includes(query);
        const matchesCategory = (category === 'all' || p.category === category);

        return matchesQuery && matchesCategory;
      });

      renderProducts(filtered);
    }

    function openQuickView(id) {
      const p = products.find(prod => prod.id === id);
      document.getElementById('modal-img').src = p.img;
      document.getElementById('modal-title').textContent = p.name;
      document.getElementById('modal-desc').textContent = p.desc;
      document.getElementById('modal-price').textContent = `$${p.price.toFixed(2)}`;
      document.getElementById('modal-add-btn').onclick = () => { addToCart(p.id); closeAllModals(); };
      
      document.getElementById('overlay').classList.add('active');
      document.getElementById('product-modal').classList.add('active');
    }

    function closeAllModals() {
      document.getElementById('overlay').classList.remove('active');
      document.getElementById('product-modal').classList.remove('active');
      toggleCart(false);
    }

    function toggleTheme() {
      document.body.classList.toggle('dark-mode');
      const isDark = document.body.classList.contains('dark-mode');
      document.getElementById('theme-btn').textContent = isDark ? "☀️ Light" : "🌙 Dark";
    }

    function applyPromo() {
      const code = document.getElementById('promo-input').value.trim().toUpperCase();
      if (code === 'DISCOUNT10') {
        discount = 0.10;
        showToast("10% discount applied!");
      } else if (code === 'STUDENT20') {
        discount = 0.20;
        showToast("20% student discount applied!");
      } else {
        alert("Invalid promo code. Try DISCOUNT10 or STUDENT20");
        discount = 0;
      }
      renderCart();
    }

    function addToCart(id) {
      const product = products.find(p => p.id === id);
      const existing = cart.find(item => item.id === id);
      if (existing) { existing.quantity += 1; } 
      else { cart.push({ ...product, quantity: 1 }); }
      saveAndRenderCart();
      showToast(`Added ${product.name} to cart!`);
    }

    function removeFromCart(id) {
      cart = cart.filter(item => item.id !== id);
      saveAndRenderCart();
    }

    function saveAndRenderCart() {
      localStorage.setItem('cart', JSON.stringify(cart));
      renderCart();
    }

    function renderCart() {
      const cartItemsContainer = document.getElementById('cart-items');
      const cartTotalPrice = document.getElementById('cart-total-price');
      const cartBadge = document.getElementById('cart-badge');

      let totalCount = 0;
      let totalPrice = 0;

      if (cart.length === 0) {
        cartItemsContainer.innerHTML = '<p style="color:var(--text-muted); text-align:center;">Your cart is empty.</p>';
      } else {
        cartItemsContainer.innerHTML = cart.map(item => {
          totalCount += item.quantity;
          totalPrice += item.price * item.quantity;
          return `
            <div class="cart-item">
              <div>
                <strong>${item.name}</strong> (${item.quantity})
                <div style="font-size: 0.85rem; color:var(--text-muted);">$${(item.price * item.quantity).toFixed(2)}</div>
              </div>
              <button style="background:none; border:none; color:#ef4444; cursor:pointer; font-weight:600;" onclick="removeFromCart(${item.id})">Remove</button>
            </div>
          `;
        }).join('');
      }

      if (discount > 0) {
        totalPrice = totalPrice * (1 - discount);
      }

      cartTotalPrice.textContent = `$${totalPrice.toFixed(2)}`;
      cartBadge.textContent = `Cart: ${totalCount}`;
    }

    function toggleCart(open) {
      document.getElementById('cart-drawer').classList.toggle('open', open);
      document.getElementById('overlay').classList.toggle('active', open);
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 2000);
    }

    async function handleCheckout() {
      if (cart.length === 0) return alert("Cart is empty!");
      alert("Order placed successfully!");
      cart = [];
      discount = 0;
      saveAndRenderCart();
      closeAllModals();
    }

    fetchProducts();
    renderCart();
  </script>
</body>
</html>
